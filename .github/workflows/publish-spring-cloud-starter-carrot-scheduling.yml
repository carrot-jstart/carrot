name: Publish spring-cloud-starter-carrot-scheduling to Maven Central

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_version:
        description: 'Release version to publish, for example 1.0.0. Leave empty to use the version in pom.xml.'
        required: false
        type: string

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
      MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
      MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
          server-id: central
          server-username: MAVEN_CENTRAL_USERNAME
          server-password: MAVEN_CENTRAL_PASSWORD
          gpg-private-key: ${{ secrets.MAVEN_GPG_PRIVATE_KEY }}
          gpg-passphrase: MAVEN_GPG_PASSPHRASE

      - name: Trust imported GPG key
        shell: pwsh
        run: |
          $keys = gpg --list-secret-keys --keyid-format LONG 2>`$null | Select-String '^sec' | ForEach-Object { $_ -replace '.*/([A-F0-9]+).*', '$$1' }
          foreach ($keyId in $keys) {
            Write-Host "Trusting GPG key: $keyId"
            "trust`n5`ny`nquit" | gpg --batch --command-fd 0 --edit-key "$keyId" trust 2>`$null
          }
          Write-Host "Imported GPG secret keys:"
          gpg --list-secret-keys --keyid-format LONG

      - name: Cache GPG passphrase in gpg-agent
        shell: bash
        run: |
          GPG_KEYGRIP=$(gpg --with-keygrip --list-secret-keys --keyid-format LONG 2>/dev/null | grep 'Keygrip' | head -1 | awk '{print $3}')
          if [ -n "$GPG_KEYGRIP" ]; then
            echo "Caching passphrase for keygrip: $GPG_KEYGRIP"
            echo "$MAVEN_GPG_PASSPHRASE" | /usr/lib/gnupg2/gpg-preset-passphrase --preset "$GPG_KEYGRIP"
          else
            echo "No keygrip found, trying alternative method..."
            echo "$MAVEN_GPG_PASSPHRASE" | gpg --batch --passphrase-fd 0 --quick-sign-key $(gpg --list-secret-keys --keyid-format LONG 2>/dev/null | grep '^sec' | head -1 | sed 's/.*\/\([A-F0-9]\+\).*/\1/') 2>/dev/null || true
          fi

      - name: Validate release version
        shell: pwsh
        run: |
          $pomPath = "spring-cloud-starter-carrot-scheduling/pom.xml"
          $manualVersion = "${{ inputs.release_version }}"

          if ("${{ github.ref_type }}" -eq "tag") {
            $expectedVersion = "${{ github.ref_name }}".TrimStart('v')
            Write-Host "Using tag version: $expectedVersion"
          } elseif (-not [string]::IsNullOrWhiteSpace($manualVersion)) {
            $expectedVersion = $manualVersion.Trim()
            Write-Host "Using manual input version: $expectedVersion"
          } else {
            [xml]$pom = Get-Content $pomPath
            $expectedVersion = $pom.project.version
            Write-Host "No tag or manual version provided, using pom.xml version: $expectedVersion"
          }

          [xml]$pom = Get-Content $pomPath
          $actualVersion = $pom.project.version
          if ($actualVersion -ne $expectedVersion) {
            throw "Version mismatch in $pomPath. Expected $expectedVersion but found $actualVersion."
          }

          Write-Host "Version validated: $expectedVersion"

      - name: Publish to Maven Central
        run: mvn -B -ntp -Pcentral-release -DskipTests deploy -f spring-cloud-starter-carrot-scheduling/pom.xml
