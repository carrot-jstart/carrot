name: Publish dubbo-spring-boot-starter to Maven Central

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_version:
        description: 'Release version to publish, for example 1.0.0. Leave empty to use the version in pom.xml.'
        required: false
        type: string

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
      MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
      MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
          server-id: central
          server-username: MAVEN_CENTRAL_USERNAME
          server-password: MAVEN_CENTRAL_PASSWORD
          gpg-private-key: ${{ secrets.MAVEN_GPG_PRIVATE_KEY }}
          gpg-passphrase: MAVEN_GPG_PASSPHRASE

      - name: Trust imported GPG key
        shell: pwsh
        run: |
          $keys = gpg --list-secret-keys --keyid-format LONG 2>`$null | Select-String '^sec' | ForEach-Object { $_ -replace '.*/([A-F0-9]+).*', '$$1' }
          foreach ($keyId in $keys) {
            Write-Host "Trusting GPG key: $keyId"
            "trust`n5`ny`nquit" | gpg --batch --command-fd 0 --edit-key "$keyId" trust 2>`$null
          }
          Write-Host "Imported GPG secret keys:"
          gpg --list-secret-keys --keyid-format LONG

      - name: Validate release version
        shell: pwsh
        run: |
          $pomPath = "dubbo-spring-boot-starter/pom.xml"
          $manualVersion = "${{ inputs.release_version }}"

          if ("${{ github.ref_type }}" -eq "tag") {
            $expectedVersion = "${{ github.ref_name }}".TrimStart('v')
            Write-Host "Using tag version: $expectedVersion"
          } elseif (-not [string]::IsNullOrWhiteSpace($manualVersion)) {
            $expectedVersion = $manualVersion.Trim()
            Write-Host "Using manual input version: $expectedVersion"
          } else {
            [xml]$pom = Get-Content $pomPath
            $expectedVersion = $pom.project.version
            Write-Host "No tag or manual version provided, using pom.xml version: $expectedVersion"
          }

          [xml]$pom = Get-Content $pomPath
          $actualVersion = $pom.project.version
          if ($actualVersion -ne $expectedVersion) {
            throw "Version mismatch in $pomPath. Expected $expectedVersion but found $actualVersion."
          }

          Write-Host "Version validated: $expectedVersion"

      - name: Debug GPG passphrase
        shell: bash
        run: |
          echo "=== GPG key info ==="
          gpg --list-secret-keys --keyid-format LONG
          echo "=== Passphrase check ==="
          if [ -z "$MAVEN_GPG_PASSPHRASE" ]; then
            echo "WARNING: MAVEN_GPG_PASSPHRASE is empty!"
          else
            echo "MAVEN_GPG_PASSPHRASE is set (showing length only): ${#MAVEN_GPG_PASSPHRASE} chars"
          fi
          echo "=== Test signing ==="
          KEY_ID=$(gpg --list-secret-keys --keyid-format LONG 2>/dev/null | grep '^sec' | head -1 | sed 's/.*\/\([A-F0-9]\+\).*/\1/')
          if [ -n "$KEY_ID" ]; then
            echo "Testing signing with key: $KEY_ID"
            echo "hello" | gpg --batch --yes --passphrase "$MAVEN_GPG_PASSPHRASE" --pinentry-mode loopback --local-user "$KEY_ID" --sign -o /dev/null 2>&1 && echo "SIGN TEST: SUCCESS" || echo "SIGN TEST: FAILED"
          fi

      - name: Publish to Maven Central
        run: mvn -B -ntp -Pcentral-release -DskipTests -Dgpg.passphrase="$MAVEN_GPG_PASSPHRASE" deploy -f dubbo-spring-boot-starter/pom.xml
