name: Publish Maven Central

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_version:
        description: 'Release version to publish, for example 0.9.1. Leave empty to use the version in pom.xml.'
        required: false
        type: string

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
      MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
      MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
          server-id: central
          server-username: MAVEN_CENTRAL_USERNAME
          server-password: MAVEN_CENTRAL_PASSWORD
          gpg-private-key: ${{ secrets.MAVEN_GPG_PRIVATE_KEY }}
          gpg-passphrase: MAVEN_GPG_PASSPHRASE

      - name: Validate release version
        shell: pwsh
        run: |
          $pomFiles = @(
            "spring-cloud-starter-carrot-config/pom.xml"
          )

          $manualVersion = "${{ inputs.release_version }}"
          if ("${{ github.ref_type }}" -eq "tag") {
            $expectedVersion = "${{ github.ref_name }}".TrimStart('v')
            Write-Host "Using tag version: $expectedVersion"
          } elseif (-not [string]::IsNullOrWhiteSpace($manualVersion)) {
            $expectedVersion = $manualVersion.Trim()
            Write-Host "Using manual input version: $expectedVersion"
          } else {
            [xml]$firstPom = Get-Content $pomFiles[0]
            $expectedVersion = $firstPom.project.version
            Write-Host "No tag or manual version provided, using pom.xml version: $expectedVersion"
          }

          foreach ($pomPath in $pomFiles) {
            [xml]$pom = Get-Content $pomPath
            $actualVersion = $pom.project.version
            if ($actualVersion -ne $expectedVersion) {
              throw "Version mismatch in $pomPath. Expected $expectedVersion but found $actualVersion."
            }
          }

      - name: Publish spring-cloud-starter-carrot-config
        run: mvn -B -ntp -Pcentral-release -DskipTests deploy -f spring-cloud-starter-carrot-config/pom.xml

